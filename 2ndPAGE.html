<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background-color: #F8C8DC; /* same blush pink */
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .white-box {
        background: white;
        padding: 40px;
        width: 350px;
        border-radius: 25px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    #text {
        font-size: 16px;
        min-height: 60px;
        margin-bottom: 25px;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 20px;
        background-color: #ff69b4;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff1493;
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="white-box">
    <p id="text"></p>
    <button onclick="goNext()">Go to Next Page</button>
</div>

<script>
    const message = "May this Holi fill your life with beautiful colors and endless happiness🌸😊.";
    let index = 0;

    function typeEffect() {
        if (index < message.length) {
            document.getElementById("text").innerHTML += message.charAt(index);
            index++;
            setTimeout(typeEffect, 40);
        }
    }

    function goNext() {
        window.location.href = "3rd.html"; // change to your next file
    }

    window.onload = typeEffect;
</script>

</body>
</html>
