<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background-color: #F8C8DC;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: Arial, sans-serif;
        position: relative;
    }

    /* Fade-in Title */
    h1 {
        position: absolute;
        top: 40px;
        font-size: 48px;
        color: white;
        opacity: 0;
        animation: fadeIn 3s ease-in forwards;
        text-shadow: 0 0 15px #ff1493;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
        }
    }

    /* Center GIF */
    .gif-container img {
        width: 250px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* Balloon / Splash Animation */
    .balloon {
        position: absolute;
        bottom: -100px;
        width: 40px;
        height: 60px;
        border-radius: 50%;
        opacity: 0.8;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        from {
            transform: translateY(0);
        }
        to {
            transform: translateY(-110vh);
        }
    }
</style>
</head>

<body>

<h1>HAPPY HOLI 🎉</h1>

<div class="gif-container">
    <!-- Replace with your Holi GIF link -->
    <img src="https://media.tenor.com/rXE-RRZs-_QAAAAM/happy-holi-holi.gif" alt="Holi GIF">
</div>

<script>
    // Create multiple floating balloons/splashes
    const colors = ["#ff0000", "#ffcc00", "#00ffcc", "#ff66cc", "#00ccff", "#ff6600"];

    for (let i = 0; i < 25; i++) {
        let balloon = document.createElement("div");
        balloon.classList.add("balloon");

        balloon.style.left = Math.random() * 100 + "vw";
        balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        balloon.style.animationDuration = (4 + Math.random() * 4) + "s";
        balloon.style.width = (30 + Math.random() * 20) + "px";
        balloon.style.height = (40 + Math.random() * 30) + "px";

        document.body.appendChild(balloon);
    }
</script>

</body>
</html>
