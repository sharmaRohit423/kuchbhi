<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holi</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #F8C8DC;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .bubble-box {
            background: rgba(255, 255, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        .bubble-box input {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .bubble-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 20px;
            background-color: #ff69b4;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .bubble-box button:hover {
            background-color: #ff1493;
            transform: scale(1.05);
        }

        .error {
            color: red;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="bubble-box">
        <input type="text" id="nameInput" placeholder="Enter your name">
        <br>
        <button onclick="goNext()">Move to the next page</button>
        <div id="message" class="error"></div>
    </div>

    <script>
        function goNext() {
            let name = document.getElementById("nameInput").value.trim();

            if (name.toLowerCase() === "Laxter") {
                window.location.href = "2ndholipae.html";
            } else {
                document.getElementById("message").innerText = "Wrong ❌";
            }
        }
    </script>

</body>
</html>
